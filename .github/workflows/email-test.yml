name: Email Digest Test

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode: "sample" sends placeholder articles, "live" uses real CSV data'
        required: true
        default: 'live'
        type: choice
        options:
          - sample
          - live
      article_count:
        description: 'Number of articles to include (1–5)'
        required: false
        default: '5'

jobs:
  email-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send test email (sample)
        if: ${{ inputs.mode == 'sample' }}
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python deepwater_news_collector.py --email-test --email-test-count ${{ inputs.article_count }} --email-required

      - name: Send test email (live CSV)
        if: ${{ inputs.mode == 'live' }}
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python deepwater_news_collector.py --email-live-from-csv --email-live-count ${{ inputs.article_count }} --email-required
